name: Sync jp.m3u from GitFlic

on:
  # Run every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the file

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:  ${{ github.repository }}   # auto-filled: "owner/repo"
          GITHUB_PATH:  jp.m3u                     # ← change if you want a sub-folder
          GITHUB_BRANCH: main                      # ← change to your default branch if different
        run: python sync_jp_m3u.py
